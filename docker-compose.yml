  # Frontend & Server Application
  stt-arena:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: stt-arena-design
    ports:
      - "3042:3000"
    environment:
      - ASR_MODE=live
      - REAL_ASR_API_URL=http://nginx-router:5000/transcribe
      - REAL_GPU_API_URL=http://nginx-router:5000/gpus
      - REAL_ENGINE_HEALTH_URL=http://nginx-router:5000/engines/health
    env_file:
      - .secrets
    depends_on:
      - nginx-router
    restart: unless-stopped

# STT Arena — real local engines, on-demand loading.
# NOTE: run ./engines/build-bases.sh once before `docker compose build`
# (engine images derive from the stt-arena-base:* images it produces).

x-engine-common: &engine-common
  restart: unless-stopped
  env_file:
    - .secrets
  environment: &engine-env
    IDLE_UNLOAD_SECONDS: "600"
    MAX_LOADED_VARIANTS: "2"
    HF_HOME: /root/.cache/huggingface
  volumes:
    - ./engines/cache:/root/.cache
  gpus: all

services:
  # Nginx Router Gateway
  nginx-router:
    image: nginx:alpine
    container_name: stt-arena-nginx-router
    ports:
      - "5000:5000"
    volumes:
      - ./engines/nginx-router.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - router
    restart: unless-stopped

  # Router: dispatch by modelId + engine health aggregation + real resource state
  router:
    build:
      context: ./engines
      dockerfile: router/Dockerfile
    container_name: stt-arena-router
    gpus: all
    restart: unless-stopped

  whisper-engine:
    <<: *engine-common
    build: {context: ./engines, dockerfile: whisper/Dockerfile}
    container_name: whisper-engine
    environment:
      <<: *engine-env
      CUDA_VISIBLE_DEVICES: "0"

  faster-whisper-engine:
    <<: *engine-common
    build: {context: ./engines, dockerfile: faster-whisper/Dockerfile}
    container_name: faster-whisper-engine

server {
    listen 5000;
    server_name localhost;

    # Allow large audio files to be uploaded
    client_max_body_size 100M;

    # Big local models on CPU can take minutes on a cold (on-demand) load
    proxy_connect_timeout 30s;
    proxy_send_timeout 1800s;
    proxy_read_timeout 1800s;

    # Resolve service names via Docker's embedded DNS at request time so engine
    # restarts never leave stale upstream IPs (previously caused 502s).
    resolver 127.0.0.11 valid=10s ipv6=off;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # All transcription goes through the router, which dispatches by the
    # modelId form field (including whisper size variants).
    location /transcribe {
        set $router_upstream http://router:5000;
        proxy_pass $router_upstream;
    }

    # Aggregated engine availability for the UI (gray/N/A badges)
    location /engines {
        set $router_upstream http://router:5000;
        proxy_pass $router_upstream;
    }

    # Resource manager (real RAM + engine load state)
    location /gpus {
        set $router_upstream http://router:5000;
        proxy_pass $router_upstream;
    }
}

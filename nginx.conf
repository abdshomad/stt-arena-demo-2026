server {
    listen 3042;
    server_name localhost;

    # Serve static files from the build output
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Redirect clean path name URLs to HashRouter routes to prevent routing errors
    location ~ ^/user-guide(.*)$ {
        return 301 $scheme://$http_host/#/user-guide$1;
    }

    location = /slides {
        return 301 $scheme://$http_host/#/slides;
    }

    location = /summary {
        return 301 $scheme://$http_host/#/summary;
    }

    location = /cx-hub {
        return 301 $scheme://$http_host/#/cx-hub;
    }

    location = /kpb-claims {
        return 301 $scheme://$http_host/#/kpb-claims;
    }

    location = /fsi-credit {
        return 301 $scheme://$http_host/#/fsi-credit;
    }

    location = /spatial-scm {
        return 301 $scheme://$http_host/#/spatial-scm;
    }

    location = /ai-insights {
        return 301 $scheme://$http_host/#/ai-insights;
    }

    location = /map {
        return 301 $scheme://$http_host/#/map;
    }

    location = /settings {
        return 301 $scheme://$http_host/#/settings;
    }
}
